<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sentiment Analysis Dashboard</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>😊 Sentiment Analysis Dashboard</h1>

<textarea
id="text"
placeholder="Type your thoughts here..."></textarea>

<button onclick="analyzeSentiment()">
Analyze Sentiment
</button>

<div class="result" id="resultCard">

    <div id="emoji" class="emoji">
        🙂
    </div>

    <h2 id="sentiment">
        Sentiment
    </h2>

    <p id="polarity">
        Polarity : 0
    </p>

    <div class="progress">

        <div class="progress-fill"
             id="progressFill">
        </div>

    </div>

</div>

<hr style="margin:30px 0; opacity:0.3;">
<div class="stats">

    <h2>📊 Statistics</h2>

    <div class="stats-grid">

        <div class="stat-card positive-card">
            <h3>😊 Positive</h3>
            <p id="positiveCount">0</p>
        </div>

        <div class="stat-card neutral-card">
            <h3>😐 Neutral</h3>
            <p id="neutralCount">0</p>
        </div>

        <div class="stat-card negative-card">
            <h3>😞 Negative</h3>
            <p id="negativeCount">0</p>
        </div>

        <div class="stat-card total-card">
            <h3>📈 Total</h3>
            <p id="totalCount">0</p>
        </div>

    </div>

</div><div class="chart-section">

    <h2>🥧 Sentiment Distribution</h2>

    <canvas id="sentimentChart"></canvas>

</div>

<div class="history">

    <h2>📜 Recent Analyses</h2>

    <div id="historyList">

        <p>No analyses yet.</p>

    </div>

</div>

<div class="footer">

Made with ❤️ using Flask + TextBlob

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
